<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
  <title>Stopwatch</title>
</head>
<body>
  <div id="app">
    <!-- Top bar: mode selector + settings -->
    <div class="top-bar">
      <div class="mode-selector">
        <button class="mode-tab mode-tab-active" data-app-mode="stopwatch">Stopwatch</button>
        <button class="mode-tab" data-app-mode="timer">Timer</button>
      </div>
      <div class="top-actions">
        <button id="sound-toggle" class="icon-btn" aria-label="Toggle sound">
          <span id="sound-icon">&#x1F50A;</span>
        </button>
        <button id="theme-toggle" class="icon-btn" aria-label="Theme settings">
          <span>&#x2699;</span>
        </button>
        <button id="history-toggle" class="icon-btn" aria-label="Session history">
          <span>&#x1F4CB;</span>
        </button>
      </div>
    </div>

    <!-- Theme picker (hidden by default) -->
    <div id="theme-picker" class="theme-picker hidden"></div>

    <div id="timer-display" role="timer" aria-live="off">
      <span id="time">00:00<span class="centiseconds">.00</span></span>
      <div id="analog-display" class="hidden">
        <svg viewBox="0 0 200 200" class="analog-svg">
          <g class="tick-marks"></g>
          <line id="analog-minute" x1="100" y1="100" x2="100" y2="40" class="analog-hand analog-hand-minute" />
          <line id="analog-second" x1="100" y1="100" x2="100" y2="25" class="analog-hand analog-hand-second" />
          <circle cx="100" cy="100" r="4" class="analog-center" />
        </svg>
        <div id="digital-small" class="digital-small">00:00.00</div>
      </div>
      <div class="mode-toggle">
        <button class="mode-dot mode-dot-active" data-mode="digital" aria-label="Digital mode"></button>
        <button class="mode-dot" data-mode="analog" aria-label="Analog mode"></button>
      </div>
    </div>

    <!-- Timer countdown display (hidden when in stopwatch mode) -->
    <div id="timer-progress" class="timer-progress hidden">
      <div class="timer-progress-bar">
        <div id="timer-progress-fill" class="timer-progress-fill"></div>
      </div>
    </div>

    <div id="offset-area">
      <button id="offset-toggle" class="offset-link">Start with time already elapsed</button>
      <div id="offset-input" class="offset-input hidden">
        <div class="offset-fields">
          <div class="offset-field">
            <input type="number" id="offset-hours" min="0" max="99" value="0" inputmode="numeric">
            <label for="offset-hours">h</label>
          </div>
          <div class="offset-field">
            <input type="number" id="offset-minutes" min="0" max="59" value="0" inputmode="numeric">
            <label for="offset-minutes">m</label>
          </div>
          <div class="offset-field">
            <input type="number" id="offset-seconds" min="0" max="59" value="0" inputmode="numeric">
            <label for="offset-seconds">s</label>
          </div>
        </div>
        <div class="offset-buttons">
          <button id="offset-set" class="offset-btn">Set</button>
          <button id="offset-cancel" class="offset-btn">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Timer duration input (hidden when in stopwatch mode) -->
    <div id="timer-set-area" class="hidden">
      <button id="timer-set-toggle" class="offset-link">Set countdown duration</button>
      <div id="timer-set-input" class="offset-input hidden">
        <div class="offset-fields">
          <div class="offset-field">
            <input type="number" id="timer-hours" min="0" max="99" value="0" inputmode="numeric">
            <label for="timer-hours">h</label>
          </div>
          <div class="offset-field">
            <input type="number" id="timer-minutes" min="0" max="59" value="0" inputmode="numeric">
            <label for="timer-minutes">m</label>
          </div>
          <div class="offset-field">
            <input type="number" id="timer-seconds" min="0" max="59" value="0" inputmode="numeric">
            <label for="timer-seconds">s</label>
          </div>
        </div>
        <div class="offset-buttons">
          <button id="timer-set-btn" class="offset-btn">Set</button>
          <button id="timer-cancel-btn" class="offset-btn">Cancel</button>
        </div>
      </div>
    </div>

    <div id="controls">
      <button id="btn-left" class="control-btn" aria-label="Lap" disabled>
        <span class="btn-inner">Lap</span>
      </button>
      <button id="btn-right" class="control-btn btn-start" aria-label="Start">
        <span class="btn-inner">Start</span>
      </button>
    </div>

    <!-- Export button -->
    <div id="export-area" class="export-area hidden">
      <button id="export-btn" class="offset-link">Export Laps</button>
    </div>

    <div id="lap-stats" class="lap-stats hidden"></div>

    <div id="lap-section">
      <div id="lap-list"></div>
    </div>

    <!-- History panel (slide-up overlay) -->
    <div id="history-panel" class="history-panel hidden">
      <div class="history-header">
        <h3>History</h3>
        <button id="history-close" class="icon-btn">&times;</button>
      </div>
      <div id="history-list" class="history-list"></div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/stopwatch.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/persistence.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/history.js"></script>
  <script src="js/export.js"></script>
  <script src="js/analog.js"></script>
  <script src="js/offset-input.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
