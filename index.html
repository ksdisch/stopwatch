<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
  <title>Stopwatch</title>
</head>
<body>
  <div id="app">
    <!-- Top bar: mode selector + settings -->
    <div class="top-bar">
      <div class="mode-selector">
        <button class="mode-tab mode-tab-active" data-app-mode="stopwatch">Stopwatch</button>
        <button class="mode-tab" data-app-mode="timer">Timer</button>
        <button class="mode-tab" data-app-mode="pomodoro">Pomodoro</button>
        <button class="mode-tab" data-app-mode="interval">Interval</button>
        <button class="mode-tab" data-app-mode="cooking">Cook</button>
      </div>
      <div class="top-actions">
        <button id="sound-toggle" class="icon-btn" aria-label="Toggle sound">
          <span id="sound-icon">&#x1F50A;</span>
        </button>
        <button id="theme-toggle" class="icon-btn" aria-label="Theme settings">
          <span>&#x2699;</span>
        </button>
        <button id="presets-toggle" class="icon-btn" aria-label="Presets">
          <span>&#x2B50;</span>
        </button>
        <button id="analytics-toggle" class="icon-btn" aria-label="Analytics">
          <span>&#x1F4CA;</span>
        </button>
        <button id="focus-toggle" class="icon-btn" aria-label="Focus mode">
          <span>&#x26F6;</span>
        </button>
        <button id="history-toggle" class="icon-btn" aria-label="Session history">
          <span>&#x1F4CB;</span>
        </button>
      </div>
    </div>

    <!-- Theme picker (hidden by default) -->
    <div id="theme-picker" class="theme-picker hidden"></div>
    <div id="sound-picker" class="theme-picker hidden"></div>

    <!-- Quick-picks (top 3 presets, auto-hides when running) -->
    <div id="presets-quick" class="presets-quick"></div>

    <!-- Presets drawer (slide-up overlay) -->
    <div id="presets-drawer" class="presets-drawer hidden">
      <div class="history-header">
        <h3>Presets</h3>
        <button id="presets-drawer-close" class="icon-btn" aria-label="Close presets">&times;</button>
      </div>
      <div class="presets-drawer-body">
        <div id="presets-grid" class="presets-grid"></div>
        <div id="preset-save-area" class="preset-save-area"></div>
      </div>
    </div>

    <div id="sr-announce" class="sr-only" aria-live="assertive" aria-atomic="true"></div>
    <div id="timer-display" role="timer" aria-label="Elapsed time">
      <div id="auto-advance-overlay" class="auto-advance-overlay hidden"></div>
      <span id="time">00:00<span class="centiseconds">.00</span></span>
      <div id="analog-display" class="hidden">
        <svg viewBox="0 0 200 200" class="analog-svg">
          <g class="tick-marks"></g>
          <line id="analog-minute" x1="100" y1="100" x2="100" y2="40" class="analog-hand analog-hand-minute" />
          <line id="analog-second" x1="100" y1="100" x2="100" y2="25" class="analog-hand analog-hand-second" />
          <circle cx="100" cy="100" r="4" class="analog-center" />
        </svg>
        <div id="digital-small" class="digital-small">00:00.00</div>
      </div>
      <div class="mode-toggle">
        <button class="mode-dot mode-dot-active" data-mode="digital" aria-label="Digital mode"></button>
        <button class="mode-dot" data-mode="analog" aria-label="Analog mode"></button>
      </div>
    </div>

    <!-- Timer countdown display (hidden when in stopwatch mode) -->
    <div id="timer-progress" class="timer-progress hidden">
      <div class="timer-progress-bar">
        <div id="timer-progress-fill" class="timer-progress-fill"></div>
      </div>
    </div>

    <div id="offset-area">
      <button id="offset-toggle" class="offset-link">Start with time already elapsed</button>
      <div id="offset-input" class="offset-input" data-collapsed>
        <div id="preset-list" class="preset-list"></div>
        <div class="offset-fields">
          <div class="offset-field">
            <input type="number" id="offset-hours" min="0" max="99" value="0" inputmode="numeric">
            <label for="offset-hours">h</label>
          </div>
          <div class="offset-field">
            <input type="number" id="offset-minutes" min="0" max="59" value="0" inputmode="numeric">
            <label for="offset-minutes">m</label>
          </div>
          <div class="offset-field">
            <input type="number" id="offset-seconds" min="0" max="59" value="0" inputmode="numeric">
            <label for="offset-seconds">s</label>
          </div>
        </div>
        <div class="offset-buttons">
          <button id="offset-set" class="offset-btn">Set</button>
          <button id="offset-save-preset" class="offset-btn">Save as Preset</button>
          <button id="offset-cancel" class="offset-btn">Cancel</button>
        </div>
        <div id="preset-name-input" class="preset-name-input hidden">
          <input type="text" id="preset-name" placeholder="Preset name" maxlength="30">
          <div class="offset-buttons">
            <button id="preset-name-save" class="offset-btn">Save</button>
            <button id="preset-name-cancel" class="offset-btn">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Vibration interval (stopwatch only) -->
    <div id="vibrate-area" class="vibrate-area">
      <label class="vibrate-label">
        <span>Vibrate every</span>
        <select id="vibrate-interval">
          <option value="0">Off</option>
          <option value="60000">1 min</option>
          <option value="300000">5 min</option>
          <option value="600000">10 min</option>
          <option value="900000">15 min</option>
          <option value="1800000">30 min</option>
        </select>
      </label>
    </div>

    <!-- Alert area (stopwatch only) -->
    <div id="alert-area" class="alert-area">
      <button id="alert-toggle" class="offset-link">Add alert at time</button>
      <div id="alert-input" class="offset-input" data-collapsed>
        <div class="offset-fields">
          <div class="offset-field">
            <input type="number" id="alert-hours" min="0" max="99" value="0" inputmode="numeric">
            <label for="alert-hours">h</label>
          </div>
          <div class="offset-field">
            <input type="number" id="alert-minutes" min="0" max="59" value="0" inputmode="numeric">
            <label for="alert-minutes">m</label>
          </div>
          <div class="offset-field">
            <input type="number" id="alert-seconds" min="0" max="59" value="0" inputmode="numeric">
            <label for="alert-seconds">s</label>
          </div>
        </div>
        <div class="offset-buttons">
          <button id="alert-set" class="offset-btn">Set</button>
          <button id="alert-cancel" class="offset-btn">Cancel</button>
        </div>
      </div>
      <div id="alert-list" class="alert-list"></div>
    </div>

    <!-- Pomodoro phase header (above controls) -->
    <div id="pomodoro-area" class="pomodoro-area hidden">
      <div class="pomodoro-phase-label">
        <span id="pomodoro-phase">Work</span>
        <span id="pomodoro-cycle" class="pomodoro-cycle">1/4</span>
      </div>
      <div id="pomodoro-dots" class="pomodoro-dots"></div>
      <div id="pomo-timeline" class="pomo-timeline"></div>
      <button id="pomo-distraction-btn" class="pomo-distraction-btn hidden">Distraction</button>
      <div id="pomo-distraction-picker" class="pomo-distraction-picker hidden">
        <div class="pomo-distraction-cats">
          <button class="pomo-distraction-cat" data-cat="phone">Phone</button>
          <button class="pomo-distraction-cat" data-cat="email">Email</button>
          <button class="pomo-distraction-cat" data-cat="interrupted">Interrupted</button>
          <button class="pomo-distraction-cat" data-cat="self">Self-distracted</button>
          <button class="pomo-distraction-cat" data-cat="other">Other</button>
        </div>
        <input type="text" id="pomo-distraction-note" placeholder="Optional note..." maxlength="60">
      </div>
    </div>

    <!-- Interval setup/info (hidden by default) -->
    <div id="interval-area" class="interval-area hidden">
      <div id="interval-setup">
        <div class="interval-templates">
          <button class="interval-tpl-btn" id="interval-tpl-tabata">Tabata</button>
          <button class="interval-tpl-btn" id="interval-tpl-hiit">HIIT 30/30</button>
          <button class="interval-tpl-btn" id="interval-tpl-custom">Custom</button>
        </div>
        <div id="interval-phase-list" class="interval-phase-list">
          <div class="interval-empty">No phases added yet</div>
        </div>
        <div class="interval-add-row">
          <input type="text" id="interval-phase-name" placeholder="Phase name" maxlength="20" class="interval-input-name">
          <input type="number" id="interval-phase-sec" value="30" min="1" max="3600" class="interval-input-sec" inputmode="numeric">
          <span class="interval-sec-label">s</span>
          <button id="interval-add-phase" class="interval-add-btn">+</button>
        </div>
        <div class="interval-config-row">
          <label>Rounds</label>
          <input type="number" id="interval-rounds" value="1" min="1" max="99" class="interval-input-small" inputmode="numeric">
          <label>Rest</label>
          <input type="number" id="interval-rest-sec" value="0" min="0" max="300" class="interval-input-small" inputmode="numeric">
          <span class="interval-sec-label">s</span>
        </div>
      </div>
      <div id="interval-run-info" class="interval-run-info hidden">
        <div id="interval-current-phase" class="interval-current-phase">Work</div>
        <div id="interval-next-phase" class="interval-next-phase">Next: Rest</div>
        <div id="interval-round-label" class="interval-round-label">Round 1/1</div>
      </div>
    </div>

    <div id="controls">
      <button id="btn-left" class="control-btn" aria-label="Lap" disabled>
        <span class="btn-inner">Lap</span>
      </button>
      <button id="btn-right" class="control-btn btn-start" aria-label="Start">
        <span class="btn-inner">Start</span>
      </button>
    </div>

    <!-- Pomodoro lists and settings (below controls) -->
    <div id="pomodoro-lists" class="pomodoro-area hidden">
      <div id="pomo-checklist" class="pomo-checklist">
        <div id="pomo-checklist-label" class="pomo-checklist-label">Focus Goals</div>
        <div id="pomo-checklist-items"></div>
        <div class="pomo-checklist-add">
          <input type="text" id="pomo-checklist-input" placeholder="Add a goal..." maxlength="60">
        </div>
      </div>
      <div id="pomo-actual-work" class="pomo-checklist">
        <div class="pomo-checklist-label">What I Worked On</div>
        <div id="pomo-actual-work-items"></div>
        <div class="pomo-checklist-add">
          <input type="text" id="pomo-actual-work-input" placeholder="Add what you worked on..." maxlength="80">
        </div>
      </div>
      <div id="pomo-break-checklist" class="pomo-checklist hidden">
        <div id="pomo-break-checklist-label" class="pomo-checklist-label">Break Tasks</div>
        <div id="pomo-break-checklist-items"></div>
        <div class="pomo-checklist-add">
          <input type="text" id="pomo-break-checklist-input" placeholder="Add a break task..." maxlength="60">
        </div>
      </div>
      <div class="pomo-action-links">
        <button id="pomodoro-stats-toggle" class="offset-link">Stats</button>
        <button id="pomodoro-settings-toggle" class="offset-link">Settings</button>
        <button id="pomodoro-actions-toggle" class="offset-link hidden">Actions</button>
        <button id="pomo-auto-advance-toggle" class="offset-link">Auto-advance: Off</button>
        <button id="pomo-saved-tasks-toggle" class="offset-link">Saved Tasks</button>
      </div>
      <div id="pomodoro-actions" class="offset-input" data-collapsed>
        <div class="pomo-actions-grid">
          <button id="pomo-clear-focus" class="pomo-action-btn">Clear Focus Goals</button>
          <button id="pomo-clear-break" class="pomo-action-btn">Clear Break Tasks</button>
          <button id="pomo-restart-phase" class="pomo-action-btn">Restart Phase</button>
          <button id="pomo-finish" class="pomo-action-btn pomo-action-btn-primary">Finish &amp; Reset</button>
          <button id="pomo-clear-all-tasks" class="pomo-action-btn">Clear All Tasks</button>
        </div>
      </div>
      <div id="pomo-saved-tasks" class="pomo-checklist hidden">
        <div class="pomo-checklist-label">Saved Tasks</div>
        <div id="pomo-saved-tasks-items"></div>
        <div class="pomo-checklist-label" style="margin-top:8px">Task Templates</div>
        <div id="pomo-task-templates"></div>
        <div class="pomo-template-save-row">
          <input type="text" id="pomo-template-name" placeholder="Template name..." maxlength="30">
          <button id="pomo-template-save-btn" class="offset-btn">Save Current</button>
        </div>
      </div>
      <div id="pomodoro-settings" class="offset-input" data-collapsed>
        <div class="pomodoro-setting-row">
          <label>Work</label>
          <input type="number" id="pomo-work-min" min="1" max="99" value="25" inputmode="numeric">
          <span>min</span>
        </div>
        <div class="pomodoro-setting-row">
          <label>Short break</label>
          <input type="number" id="pomo-short-min" min="1" max="30" value="5" inputmode="numeric">
          <span>min</span>
        </div>
        <div class="pomodoro-setting-row">
          <label>Long break</label>
          <input type="number" id="pomo-long-min" min="1" max="60" value="15" inputmode="numeric">
          <span>min</span>
        </div>
        <div class="pomodoro-setting-row">
          <label>Cycles</label>
          <input type="number" id="pomo-cycles" min="1" max="10" value="4" inputmode="numeric">
        </div>
        <div class="offset-buttons">
          <button id="pomo-settings-save" class="offset-btn">Save</button>
          <button id="pomo-settings-cancel" class="offset-btn">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Cooking mode (hidden by default) -->
    <div id="cooking-area" class="cooking-area hidden">
      <div id="cooking-timer-list" class="cooking-timer-list">
        <div class="cooking-empty">Tap "Add Timer" to start cooking</div>
      </div>
      <button id="cooking-add-btn" class="cooking-add-btn">+ Add Timer</button>
    </div>

    <!-- Timer duration input (hidden when in stopwatch mode) -->
    <div id="seq-mode-area" class="hidden" style="text-align:center;padding:4px 0;">
      <button id="seq-mode-toggle" class="offset-link">Sequence Mode</button>
    </div>
    <div id="sequence-area" class="sequence-area hidden">
      <div id="seq-setup">
        <div class="interval-templates">
          <button class="interval-tpl-btn" id="seq-tpl-warmup">Warm Up</button>
          <button class="interval-tpl-btn" id="seq-tpl-cooking">Cooking</button>
          <button class="interval-tpl-btn" id="seq-tpl-custom">Custom</button>
        </div>
        <div id="seq-phase-list" class="interval-phase-list">
          <div class="interval-empty">No phases added yet</div>
        </div>
        <div class="interval-add-row">
          <input type="text" id="seq-phase-name" placeholder="Phase name" maxlength="20" class="interval-input-name">
          <input type="number" id="seq-phase-sec" value="30" min="1" max="3600" class="interval-input-sec" inputmode="numeric">
          <span class="interval-sec-label">s</span>
          <button id="seq-add-phase" class="interval-add-btn">+</button>
        </div>
      </div>
      <div id="seq-run-info" class="interval-run-info hidden">
        <div id="seq-current-phase" class="interval-current-phase"></div>
        <div id="seq-next-phase" class="interval-next-phase"></div>
        <div id="seq-phase-count" class="interval-round-label"></div>
      </div>
    </div>
    <div id="timer-set-area" class="hidden">
      <button id="timer-set-toggle" class="offset-link">Set countdown duration</button>
      <div id="timer-set-input" class="offset-input" data-collapsed>
        <div class="offset-fields">
          <div class="offset-field">
            <input type="number" id="timer-hours" min="0" max="99" value="0" inputmode="numeric">
            <label for="timer-hours">h</label>
          </div>
          <div class="offset-field">
            <input type="number" id="timer-minutes" min="0" max="59" value="0" inputmode="numeric">
            <label for="timer-minutes">m</label>
          </div>
          <div class="offset-field">
            <input type="number" id="timer-seconds" min="0" max="59" value="0" inputmode="numeric">
            <label for="timer-seconds">s</label>
          </div>
        </div>
        <div class="offset-buttons">
          <button id="timer-set-btn" class="offset-btn">Set</button>
          <button id="timer-cancel-btn" class="offset-btn">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Instance cards (multiple stopwatches/timers) -->
    <div id="instance-cards" class="instance-cards"></div>

    <!-- Compare view (split-screen) -->
    <div id="compare-view" class="compare-view hidden"></div>

    <!-- Export button -->
    <div id="export-area" class="export-area hidden">
      <button id="export-btn" class="offset-link">Export Laps</button>
    </div>

    <div id="lap-stats" class="lap-stats hidden"></div>
    <div id="lap-chart" class="lap-chart hidden"></div>

    <div id="lap-section" aria-label="Lap times">
      <div id="lap-list" role="list"></div>
    </div>

    <!-- Pomodoro stats panel (slide-up overlay) -->
    <div id="analytics-panel" class="analytics-panel hidden">
      <div class="history-header">
        <h3>Analytics</h3>
        <button id="analytics-close" class="icon-btn" aria-label="Close analytics">&times;</button>
      </div>
      <div id="analytics-content" class="analytics-content"></div>
    </div>

    <div id="pomo-stats-panel" class="pomo-stats-panel hidden">
      <div class="history-header">
        <h3>Pomodoro Stats</h3>
        <button id="pomo-stats-close" class="icon-btn" aria-label="Close stats">&times;</button>
      </div>
      <div id="pomo-stats-content" class="pomo-stats-content"></div>
    </div>

    <!-- History panel (slide-up overlay) -->
    <div id="history-panel" class="history-panel hidden">
      <div class="history-header">
        <h3>History</h3>
        <button id="history-close" class="icon-btn" aria-label="Close history">&times;</button>
      </div>
      <div id="history-filter" class="history-filter"></div>
      <div id="history-list" class="history-list"></div>
      <div class="history-actions">
        <button id="history-log-past" class="offset-link">Log Past Session</button>
        <button id="history-export-all" class="offset-link">Export All Data</button>
        <button id="history-import" class="offset-link">Import Data</button>
        <button id="history-clear-all" class="offset-link history-danger">Clear All</button>
        <input type="file" id="history-import-input" accept=".json" class="hidden">
      </div>
      <div id="log-past-form" class="log-past-form hidden">
        <div class="log-past-title">Log Past Session</div>
        <div class="log-past-row">
          <label>Mode</label>
          <select id="log-past-mode">
            <option value="pomodoro">Pomodoro</option>
            <option value="stopwatch">Stopwatch</option>
            <option value="timer">Timer</option>
            <option value="interval">Interval</option>
          </select>
        </div>
        <div class="log-past-row">
          <label>Date</label>
          <input type="date" id="log-past-date">
        </div>
        <div class="log-past-row">
          <label>Start time</label>
          <input type="time" id="log-past-start">
        </div>
        <div class="log-past-row">
          <label>End time</label>
          <input type="time" id="log-past-end">
        </div>
        <div id="log-past-pomo-fields">
          <div class="log-past-row">
            <label>Cycles completed</label>
            <input type="number" id="log-past-cycles" min="0" max="20" value="1" inputmode="numeric">
          </div>
          <div class="log-past-row">
            <label>Work min/cycle</label>
            <input type="number" id="log-past-work-min" min="1" max="99" value="25" inputmode="numeric">
          </div>
          <div class="log-past-list-row">
            <label>Focus goals completed</label>
            <div class="log-past-list" id="log-past-focus-goals"></div>
            <input type="text" id="log-past-focus-input" placeholder="Add a completed goal..." maxlength="60">
          </div>
          <div class="log-past-list-row">
            <label>Break tasks completed</label>
            <div class="log-past-list" id="log-past-break-tasks"></div>
            <input type="text" id="log-past-break-input" placeholder="Add a break task..." maxlength="60">
          </div>
          <div class="log-past-list-row">
            <label>What I worked on</label>
            <div class="log-past-list" id="log-past-actual-work"></div>
            <input type="text" id="log-past-actual-input" placeholder="Add what you worked on..." maxlength="80">
          </div>
        </div>
        <div class="log-past-row">
          <label>Note</label>
          <input type="text" id="log-past-note" placeholder="Optional note..." maxlength="100">
        </div>
        <div class="log-past-row">
          <label>Tags</label>
          <input type="text" id="log-past-tags" placeholder="Comma-separated tags..." maxlength="100">
        </div>
        <div class="offset-buttons">
          <button id="log-past-save" class="offset-btn">Save</button>
          <button id="log-past-cancel" class="offset-btn">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/dom-utils.js"></script>
  <script src="js/stopwatch.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/instance-manager.js"></script>
  <script src="js/pomodoro.js"></script>
  <script src="js/interval.js"></script>
  <script src="js/persistence.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/history.js"></script>
  <script src="js/export.js"></script>
  <script src="js/analog.js"></script>
  <script src="js/offset-input.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/cards-ui.js"></script>
  <script src="js/compare-ui.js"></script>
  <script src="js/timer-ui.js"></script>
  <script src="js/pomodoro-ui.js"></script>
  <script src="js/alert-ui.js"></script>
  <script src="js/bg-notify.js"></script>
  <script src="js/interval-ui.js"></script>
  <script src="js/cooking-ui.js"></script>
  <script src="js/pomodoro-stats.js"></script>
  <script src="js/history-ui.js"></script>
  <script src="js/sequence.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/focus-ui.js"></script>
  <script src="js/sequence-ui.js"></script>
  <script src="js/analytics-ui.js"></script>
  <script src="js/presets.js"></script>
  <script src="js/presets-ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
